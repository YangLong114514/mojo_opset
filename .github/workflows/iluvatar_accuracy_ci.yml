name: Run test case on ilu
on:
  pull_request:
    branches:
    - master
    types: [ opened, synchronize, reopened ]
    paths-ignore:
    - 'CHANGELOG.md'
    - 'README.md'
    - 'mojo_opset/backends/ttx/kernels/npu/**'
    - 'mojo_opset/backends/torch_npu/**'
    - '.github/workflows/ascend_accuracy_ci.yml'
  push:
    branches:
    - master
    paths-ignore:
    - 'CHANGELOG.md'
    - 'README.md'
    - 'mojo_opset/backends/ttx/kernels/npu/**'
    - 'mojo_opset/backends/torch_npu/**'
    - '.github/workflows/ascend_accuracy_ci.yml'
  workflow_dispatch:
env:
  MOJO_OPSET_PROXY: ${{ secrets.MOJO_OPSET_PROXY }}
  CONTAINER_NAME: ci-ilu-${{ github.run_id }}
defaults:
  run:
    shell: bash
jobs:
  run-tests:
    name: Run ilu tests
    runs-on: ILU
    steps:
      - name: Pre-cleanup workspace
        run: |
          docker run --rm \
            -v ${{ github.workspace }}:/workspace \
            corex:4.5.0rc \
            bash -c "find /workspace -mindepth 1 -delete" || true

      - uses: actions/checkout@v4

      - name: Start container
        run: |
          docker run -d --rm \
            --name ${{ env.CONTAINER_NAME }} \
            --privileged --cap-add=ALL --pid=host --ipc=host --network=host \
            -v ${{ github.workspace }}:/workspace \
            -v /data:/data \
            -v /data1:/data1 \
            -v /lib/modules:/lib/modules \
            -v /usr/src:/usr/src \
            -v /dev:/dev \
            corex:4.5.0rc \
            tail -f /dev/null

      - name: Build And Install Wheel Artifact
        env:
          DEEPSPARK_USER: ${{ secrets.DEEPSPARK_USER }}
          DEEPSPARK_PASS: ${{ secrets.DEEPSPARK_PASS }}
        run: |
          docker exec ${{ env.CONTAINER_NAME }} bash -c "
            set -euo pipefail
            cd /workspace
            git config --global --add safe.directory /workspace
            export HTTP_PROXY=${MOJO_OPSET_PROXY} HTTPS_PROXY=${MOJO_OPSET_PROXY}
            pip install -U pip setuptools wheel --no-input --no-cache-dir
            pip install pytest-xdist build --no-cache-dir --no-build-isolation
            pip install -e .[ilu] --index-url https://bytedpypi.byted.org/simple
            python3 -m build .
            pip install dist/*.whl --force-reinstall --no-deps
            pip3 uninstall -y ixformer
            curl -O -u "${DEEPSPARK_USER}:${DEEPSPARK_PASS}" http://files.deepspark.org.cn:880/upload/ixformer-0.7.0+corex.4.5.0.rc.5.20260609-cp310-cp310-linux_x86_64.whl
            pip3 install ixformer*.whl
          "

      - name: test-TTX
        run: |
          docker exec ${{ env.CONTAINER_NAME }} bash -c "
            set -euo pipefail
            cd /workspace
            echo 'Running ttx kernels tests on Iluvatar GPU...'
            TRITON_DISABLE_AUTOTUNE=1 MOJO_BACKEND=ttx python3 -m pytest -n 8 mojo_opset/tests/accuracy/operators/ \
              --ignore=mojo_opset/tests/accuracy/operators/test_compute_with_comm.py
          "

      - name: test-Ixformer
        run: |
          docker exec ${{ env.CONTAINER_NAME }} bash -c "
            set -euo pipefail
            cd /workspace
            echo 'Running ixformer tests on Iluvatar GPU...'
            MOJO_BACKEND=ixformer python3 -m pytest -n 8 mojo_opset/tests/accuracy/operators/ \
              --ignore=mojo_opset/tests/accuracy/operators/test_compute_with_comm.py
          "

      - name: test-Distributed
        run: |
          docker exec ${{ env.CONTAINER_NAME }} bash -c "
            set -euo pipefail
            cd /workspace
            echo 'Running distributed MoE EP=2 tests (ttx + ixformer) on Iluvatar GPU...'
            MOJO_BACKEND=ttx torchrun --nproc-per-node=2 --master_port=31876 \
              -m pytest -v mojo_opset/tests/distributed/test_moe_ep.py
            MOJO_BACKEND=ixformer torchrun --nproc-per-node=2 --master_port=31877 \
              -m pytest -v mojo_opset/tests/distributed/test_moe_ep.py
          "

      - name: Cleanup
        if: always()
        run: |
          docker exec ${{ env.CONTAINER_NAME }} bash -c "find /workspace -mindepth 1 -delete" || true
          docker rm -f ${{ env.CONTAINER_NAME }} || true
